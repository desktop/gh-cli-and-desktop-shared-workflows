name: 'Triage: Close invalid issues/PRs'

# Expected triggers: issues: [labeled], pull_request_target: [labeled]
# **What it does**: This action closes issues and PRs that are labeled as invalid.

on:
  workflow_call:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  close-on-adding-invalid-label:
    if: github.event.label.name == 'invalid'
    runs-on: ubuntu-latest

    steps:
      - name: Remove needs-triage label (issue)
        if: ${{ github.event_name == 'issues' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: gh issue edit "$ISSUE_URL" --remove-label "needs-triage" || true

      - name: Remove needs-triage label (PR)
        if: ${{ github.event_name == 'pull_request_target' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr edit "$PR_URL" --remove-label "needs-triage" || true

      - name: Close issue
        if: ${{ github.event_name == 'issues' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: gh issue close "$ISSUE_URL"

      - name: Close PR
        if: ${{ github.event_name == 'pull_request_target' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr close "$PR_URL"
