name: 'Pitch: Surface top community issues'
# Expected triggers: schedule (monthly)
on:
  workflow_call:
    inputs:
      pitch_label:
        description: 'Label to apply to surfaced issues'
        type: string
        required: false
        default: 'pitch'
      max_pitched:
        description: 'Maximum number of issues with the pitch label at any time'
        type: number
        required: false
        default: 30
      exclude_labels:
        description: 'Comma-separated list of labels to exclude from consideration'
        type: string
        required: false
        default: ''

permissions:
  issues: write

jobs:
  surface_top_issues:
    runs-on: ubuntu-latest
    steps:
      - name: Surface top community issues by engagement
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PITCH_LABEL: ${{ inputs.pitch_label || 'pitch' }}
          MAX_PITCHED: ${{ inputs.max_pitched || 30 }}
          EXCLUDE_LABELS: ${{ inputs.exclude_labels }}
        run: |
          set -euo pipefail

          # Count how many issues already have the pitch label
          already_pitched=$(gh issue list \
            --label "$PITCH_LABEL" \
            --state open \
            --json number \
            --jq 'length')

          echo "Currently pitched issues: $already_pitched"

          slots_available=$((MAX_PITCHED - already_pitched))

          if [ "$slots_available" -le 0 ]; then
            echo "Already at or above the cap of $MAX_PITCHED pitched issues. Nothing to do."
            exit 0
          fi

          echo "Slots available: $slots_available"

          # Build exclude query for issues that already have the pitch label
          exclude_query="-label:${PITCH_LABEL}"

          # Exclude additional labels if specified
          if [ -n "$EXCLUDE_LABELS" ]; then
            IFS=',' read -ra LABELS <<< "$EXCLUDE_LABELS"
            for label in "${LABELS[@]}"; do
              label=$(echo "$label" | xargs)  # trim whitespace
              exclude_query="$exclude_query -label:${label}"
            done
          fi

          echo "Exclude query: $exclude_query"

          # Fetch top candidate issues by engagement (reactions)
          # Use -- to separate the query (which may contain -label:) from flags
          candidates=$(gh search issues \
            --repo "$GH_REPO" \
            --state open \
            --sort interactions \
            --order desc \
            --limit "$slots_available" \
            --json number \
            --jq '.[].number' \
            -- "$exclude_query")

          if [ -z "$candidates" ]; then
            echo "No candidate issues found."
            exit 0
          fi

          # Apply the pitch label to each candidate
          for issue_number in $candidates; do
            echo "Adding '$PITCH_LABEL' label to issue #$issue_number"
            gh issue edit "$issue_number" --add-label "$PITCH_LABEL"
          done

          echo "Done. Labeled $(echo "$candidates" | wc -w | xargs) issues."
