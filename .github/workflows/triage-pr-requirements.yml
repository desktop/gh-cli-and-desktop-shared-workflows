name: 'Triage: Check PR requirements'

# Expected triggers: pull_request_target: [opened, reopened, edited], schedule
# Checks external PRs for minimum requirements:
# 1. PR body must be at least 10 characters
# 2. PR must reference an issue with the 'help wanted' label
# If requirements are not met, adds 'unmet-requirements' label and comments.
# Also re-checks on PR edits and removes the label if requirements are now met.
#
# Smart triage (opt-in via enable_smart_triage):
# - Instantly closes spam PRs (zero files, empty body, irrelevant paths)
# - Detects same-author resubmissions of recently closed PRs
# - Fast-tracks small, focused contributions to triage instead of auto-closing

on:
  workflow_call:
    inputs:
      min_body_length:
        description: 'Minimum PR body length in characters'
        type: number
        required: false
        default: 10
      help_wanted_label:
        description: 'Label that must be on the referenced issue'
        type: string
        required: false
        default: 'help wanted'
      unmet_label:
        description: 'Label to add when requirements are not met'
        type: string
        required: false
        default: 'unmet-requirements'
      triage_label:
        description: 'Triage label to manage'
        type: string
        required: false
        default: 'needs-triage'
      external_label:
        description: 'Label that identifies external PRs'
        type: string
        required: false
        default: 'external'
      repository_org:
        description: 'Organization name to check if PR is external'
        type: string
        required: false
      days_until_close:
        description: 'Number of days before closing PRs with unmet requirements'
        type: number
        required: false
        default: 7
      enable_smart_triage:
        description: 'Enable smart triage features (spam detection, resubmission detection, small-fix fast-track)'
        type: boolean
        required: false
        default: false
      smart_triage_max_loc:
        description: 'Maximum lines changed (additions + deletions) for small-fix fast-track'
        type: number
        required: false
        default: 30
      smart_triage_max_files:
        description: 'Maximum files changed for small-fix fast-track'
        type: number
        required: false
        default: 3
      smart_triage_min_body:
        description: 'Minimum PR body length (after normalization) for small-fix fast-track'
        type: number
        required: false
        default: 100
      smart_triage_spam_paths:
        description: 'Comma-separated path prefixes considered irrelevant (e.g., ".circleci/,.devcontainer/")'
        type: string
        required: false
        default: ''

permissions:
  issues: read
  pull-requests: write

jobs:
  check-requirements:
    runs-on: ubuntu-latest
    # Run on external PRs when opened/reopened, or when a PR with 'unmet-requirements' is edited
    # Skip draft PRs
    if: |
      !github.event.pull_request.draft &&
      (
        (github.event_name == 'pull_request_target' && (github.event.action == 'opened' || github.event.action == 'reopened') && startsWith(github.event.pull_request.head.label, format('{0}:', inputs.repository_org || github.repository_owner)) == false) ||
        (github.event_name == 'pull_request_target' && github.event.action == 'edited' && contains(github.event.pull_request.labels.*.name, 'unmet-requirements'))
      )
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Detect and close spam PRs
        id: spam
        if: inputs.enable_smart_triage && (github.event.action == 'opened' || github.event.action == 'reopened')
        env:
          PRBODY: ${{ github.event.pull_request.body }}
          SPAM_PATHS: ${{ inputs.smart_triage_spam_paths }}
        run: |
          IS_SPAM="false"
          SPAM_REASON=""

          # Get PR file stats
          PR_DATA=$(gh pr view "$NUMBER" --json additions,deletions,changedFiles,files --jq '{additions,deletions,changedFiles,files:[.files[].path]}' 2>/dev/null || echo "")

          if [ -z "$PR_DATA" ]; then
            echo "is_spam=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED_FILES=$(echo "$PR_DATA" | jq -r '.changedFiles')
          ADDITIONS=$(echo "$PR_DATA" | jq -r '.additions')
          DELETIONS=$(echo "$PR_DATA" | jq -r '.deletions')

          # Check 1: Zero changed files
          if [ "$CHANGED_FILES" -eq 0 ] && [ "$ADDITIONS" -eq 0 ] && [ "$DELETIONS" -eq 0 ]; then
            IS_SPAM="true"
            SPAM_REASON="This pull request contains no file changes."
          fi

          # Check 2: Normalize body and check length (use perl for multiline comment stripping)
          if [ "$IS_SPAM" = "false" ]; then
            NORMALIZED_BODY=$(echo "$PRBODY" | perl -0pe 's/<!--.*?-->//gs' | sed '/^[[:space:]]*$/d' | tr -s '[:space:]' ' ' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
            NORM_LENGTH=$(echo -n "$NORMALIZED_BODY" | wc -c | tr -d ' ')
            if [ "$NORM_LENGTH" -lt 50 ]; then
              IS_SPAM="true"
              SPAM_REASON="This pull request has no meaningful description."
            fi
          fi

          # Check 3: All changed files in irrelevant paths
          if [ "$IS_SPAM" = "false" ] && [ -n "$SPAM_PATHS" ]; then
            FILE_PATHS=$(echo "$PR_DATA" | jq -r '.files[]')
            ALL_IRRELEVANT="true"

            if [ -n "$FILE_PATHS" ]; then
              echo "$FILE_PATHS" | while IFS= read -r filepath; do
                MATCH="false"
                IFS=',' read -ra PREFIXES <<< "$SPAM_PATHS"
                for prefix in "${PREFIXES[@]}"; do
                  prefix=$(echo "$prefix" | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
                  [ -z "$prefix" ] && continue
                  if [[ "$filepath" == "$prefix"* ]]; then
                    MATCH="true"
                    break
                  fi
                done
                if [ "$MATCH" = "false" ]; then
                  echo "false" > /tmp/all_irrelevant
                  break
                fi
              done

              if [ -f /tmp/all_irrelevant ]; then
                ALL_IRRELEVANT="false"
                rm -f /tmp/all_irrelevant
              fi
            else
              ALL_IRRELEVANT="false"
            fi

            if [ "$ALL_IRRELEVANT" = "true" ] && [ "$CHANGED_FILES" -gt 0 ]; then
              IS_SPAM="true"
              SPAM_REASON="This pull request only modifies files outside the scope of this project."
            fi
          fi

          echo "is_spam=$IS_SPAM" >> $GITHUB_OUTPUT

          if [ "$IS_SPAM" = "true" ]; then
            gh pr comment "$NUMBER" --body "$SPAM_REASON This does not appear to be a meaningful contribution and has been closed automatically.

          If this was closed by mistake, please comment with additional context and we'll be happy to reopen."
            gh pr close "$NUMBER"
          fi

      - name: Detect same-author resubmissions
        id: resubmission
        if: inputs.enable_smart_triage && steps.spam.outputs.is_spam != 'true' && (github.event.action == 'opened' || github.event.action == 'reopened')
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          UNMET_LABEL: ${{ inputs.unmet_label || 'unmet-requirements' }}
        run: |
          IS_RESUB="false"
          PREV_PR=""

          # Fetch recently closed PRs from same author with unmet-requirements (single call)
          CLOSED_PRS_JSON=$(gh pr list --state closed --author "$PR_AUTHOR" --label "$UNMET_LABEL" --limit 10 --json number,title,files,closedAt 2>/dev/null || echo "[]")

          if [ "$(echo "$CLOSED_PRS_JSON" | jq 'length')" -eq 0 ]; then
            echo "is_resubmission=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get this PR's files
          CURRENT_FILES=$(gh pr view "$NUMBER" --json files --jq '[.files[].path] | sort' 2>/dev/null || echo "[]")
          CURRENT_FILE_COUNT=$(echo "$CURRENT_FILES" | jq 'length')

          if [ "$CURRENT_FILE_COUNT" -eq 0 ]; then
            echo "is_resubmission=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check each closed PR for file overlap within 30-day window
          CUTOFF=$(date -u -d "30 days ago" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-30d +%Y-%m-%dT%H:%M:%SZ)

          echo "$CLOSED_PRS_JSON" | jq -c '.[]' | while IFS= read -r pr_json; do
            CLOSED_AT=$(echo "$pr_json" | jq -r '.closedAt // ""')

            # Skip PRs closed more than 30 days ago
            if [ -n "$CLOSED_AT" ] && [[ "$CLOSED_AT" < "$CUTOFF" ]]; then
              continue
            fi

            PREV_NUM=$(echo "$pr_json" | jq -r '.number')
            PREV_FILES=$(echo "$pr_json" | jq '[.files[].path] | sort')

            # Calculate overlapping files
            OVERLAP=$(jq -n --argjson a "$CURRENT_FILES" --argjson b "$PREV_FILES" '[$a[] as $f | select($b | index($f))] | length')

            # Require ≥2 overlapping files, or full overlap for small PRs (1-2 files)
            if ([ "$OVERLAP" -ge 2 ] || ([ "$CURRENT_FILE_COUNT" -le 2 ] && [ "$OVERLAP" -eq "$CURRENT_FILE_COUNT" ])); then
              echo "true" > /tmp/is_resub
              echo "$PREV_NUM" > /tmp/prev_pr
              break
            fi
          done

          if [ -f /tmp/is_resub ]; then
            IS_RESUB="true"
            PREV_PR=$(cat /tmp/prev_pr)
            rm -f /tmp/is_resub /tmp/prev_pr
          fi

          echo "is_resubmission=$IS_RESUB" >> $GITHUB_OUTPUT

          if [ "$IS_RESUB" = "true" ]; then
            gh pr comment "$NUMBER" --body "This pull request appears to be a resubmission of a recently closed PR (#$PREV_PR) that did not meet the contribution requirements.

          Rather than resubmitting, please ensure your contribution:
          1. References an issue with the \`${{ inputs.help_wanted_label || 'help wanted' }}\` label
          2. Includes a detailed description

          If you believe this is a different contribution, please comment with details and we'll be happy to reopen."
            gh pr edit "$NUMBER" --add-label "$UNMET_LABEL" --remove-label "${{ inputs.triage_label || 'needs-triage' }}" || true
            gh pr close "$NUMBER"
          fi

      - name: Check PR requirements
        id: check
        if: steps.spam.outputs.is_spam != 'true' && steps.resubmission.outputs.is_resubmission != 'true'
        env:
          PRBODY: ${{ github.event.pull_request.body }}
          MIN_LENGTH: ${{ inputs.min_body_length || 10 }}
          HELP_WANTED_LABEL: ${{ inputs.help_wanted_label || 'help wanted' }}
        run: |
          ISSUES_MET="false"
          BODY_MET="false"
          REASONS=""

          # Check body length
          BODY_LENGTH=$(echo -n "$PRBODY" | wc -c | tr -d ' ')
          if [ "$BODY_LENGTH" -ge "$MIN_LENGTH" ]; then
            BODY_MET="true"
          else
            REASONS="- PR description is missing or too short — please provide a detailed description"
          fi

          # Collect issue numbers from closingIssuesReferences (structured) and regex fallback (bare mentions)
          CLOSING_ISSUES=$(gh pr view "$NUMBER" --json closingIssuesReferences --jq '.closingIssuesReferences[].number' 2>/dev/null || echo "")
          REGEX_ISSUES=$(echo "$PRBODY" | grep -oE '#[0-9]+|issues/[0-9]+' | grep -oE '[0-9]+' || echo "")
          ISSUE_NUMBERS=$(echo -e "$CLOSING_ISSUES\n$REGEX_ISSUES" | sort -u | grep -v '^$' || true)

          if [ -z "$ISSUE_NUMBERS" ]; then
            REASONS="$REASONS
          - No linked \`$HELP_WANTED_LABEL\` issue found in PR description"
          else
            # Check each referenced issue for help wanted label
            for ISSUE_NUM in $ISSUE_NUMBERS; do
              LABELS=$(gh issue view "$ISSUE_NUM" --json labels --jq '.labels[].name' 2>/dev/null || echo "")
              if echo "$LABELS" | grep -qx "$HELP_WANTED_LABEL"; then
                ISSUES_MET="true"
                break
              fi
            done
            if [ "$ISSUES_MET" = "false" ]; then
              REASONS="$REASONS
          - None of the referenced issues have the \`$HELP_WANTED_LABEL\` label"
            fi
          fi

          if [ "$BODY_MET" = "true" ] && [ "$ISSUES_MET" = "true" ]; then
            echo "requirements_met=true" >> $GITHUB_OUTPUT
          else
            echo "requirements_met=false" >> $GITHUB_OUTPUT
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "reasons<<$EOF" >> $GITHUB_OUTPUT
            echo "$REASONS" >> $GITHUB_OUTPUT
            echo "$EOF" >> $GITHUB_OUTPUT
          fi

      - name: Check if PR qualifies for small-fix fast-track
        id: fast_track
        if: |
          inputs.enable_smart_triage &&
          steps.check.outputs.requirements_met == 'false' &&
          (github.event.action == 'opened' || github.event.action == 'reopened')
        env:
          PRBODY: ${{ github.event.pull_request.body }}
          MAX_LOC: ${{ inputs.smart_triage_max_loc || 30 }}
          MAX_FILES: ${{ inputs.smart_triage_max_files || 3 }}
          MIN_BODY: ${{ inputs.smart_triage_min_body || 100 }}
        run: |
          QUALIFIES="false"

          # Get PR stats
          PR_STATS=$(gh pr view "$NUMBER" --json additions,deletions,changedFiles 2>/dev/null || echo "")
          if [ -z "$PR_STATS" ]; then
            echo "qualifies=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          ADDITIONS=$(echo "$PR_STATS" | jq -r '.additions')
          DELETIONS=$(echo "$PR_STATS" | jq -r '.deletions')
          CHANGED_FILES=$(echo "$PR_STATS" | jq -r '.changedFiles')
          TOTAL_LOC=$((ADDITIONS + DELETIONS))

          # Normalize body (strip template comments including multiline, collapse whitespace)
          NORMALIZED_BODY=$(echo "$PRBODY" | perl -0pe 's/<!--.*?-->//gs' | sed '/^[[:space:]]*$/d' | tr -s '[:space:]' ' ' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
          NORM_LENGTH=$(echo -n "$NORMALIZED_BODY" | wc -c | tr -d ' ')

          if [ "$TOTAL_LOC" -le "$MAX_LOC" ] && [ "$CHANGED_FILES" -le "$MAX_FILES" ] && [ "$NORM_LENGTH" -ge "$MIN_BODY" ]; then
            QUALIFIES="true"
          fi

          echo "qualifies=$QUALIFIES" >> $GITHUB_OUTPUT

      - name: Fast-track small fix to triage
        if: steps.fast_track.outputs.qualifies == 'true'
        env:
          TRIAGE_LABEL: ${{ inputs.triage_label || 'needs-triage' }}
        run: |
          gh pr edit "$NUMBER" --add-label "$TRIAGE_LABEL"

          gh pr comment "$NUMBER" --body "Thanks for your pull request! While it doesn't meet all of our standard requirements, it appears to be a small, focused contribution and has been routed to the team for review.

          **Note:** We still encourage linking to an issue with the \`${{ inputs.help_wanted_label || 'help wanted' }}\` label when possible, as it helps us prioritize and track contributions."

      - name: Add unmet-requirements label and comment
        if: |
          steps.check.outputs.requirements_met == 'false' &&
          steps.fast_track.outputs.qualifies != 'true' &&
          (github.event.action == 'opened' || github.event.action == 'reopened')
        env:
          UNMET_LABEL: ${{ inputs.unmet_label || 'unmet-requirements' }}
          TRIAGE_LABEL: ${{ inputs.triage_label || 'needs-triage' }}
          DAYS: ${{ inputs.days_until_close || 7 }}
          REASONS: ${{ steps.check.outputs.reasons }}
        run: |
          gh pr edit "$NUMBER" --add-label "$UNMET_LABEL" --remove-label "$TRIAGE_LABEL"

          gh pr comment "$NUMBER" --body "Thanks for your pull request! Unfortunately, it doesn't meet the minimum requirements for review:

          $REASONS

          **Please update your PR to address the above.** Requirements:
          1. Include a detailed description of what this PR does
          2. Link to an issue with the \`${{ inputs.help_wanted_label || 'help wanted' }}\` label (use \`Fixes #123\` or \`Closes #123\` if it resolves the issue)

          This PR will be automatically closed in **$DAYS days** if these requirements are not met."

      - name: Remove unmet-requirements label if now passing
        if: steps.check.outputs.requirements_met == 'true' && github.event.action == 'edited'
        env:
          UNMET_LABEL: ${{ inputs.unmet_label || 'unmet-requirements' }}
          TRIAGE_LABEL: ${{ inputs.triage_label || 'needs-triage' }}
        run: |
          gh pr edit "$NUMBER" --remove-label "$UNMET_LABEL" --add-label "$TRIAGE_LABEL"
          gh pr comment "$NUMBER" --body "Thank you for updating your pull request! It now meets the minimum requirements and has been queued for triage."

  close-unmet-requirements:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Close PRs with unmet requirements past deadline
        env:
          UNMET_LABEL: ${{ inputs.unmet_label || 'unmet-requirements' }}
          DAYS: ${{ inputs.days_until_close || 7 }}
          HELP_WANTED_LABEL: ${{ inputs.help_wanted_label || 'help wanted' }}
          MIN_LENGTH: ${{ inputs.min_body_length || 10 }}
          TRIAGE_LABEL: ${{ inputs.triage_label || 'needs-triage' }}
        run: |
          CUTOFF_DATE=$(date -u -d "$DAYS days ago" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-${DAYS}d +%Y-%m-%dT%H:%M:%SZ)

          gh pr list --label "$UNMET_LABEL" --state open --json number,createdAt,body,labels --jq '.[]' | while read -r PR_JSON; do
            PR_NUM=$(echo "$PR_JSON" | jq -r '.number')
            PRBODY=$(echo "$PR_JSON" | jq -r '.body // ""')

            # Find when unmet-requirements label was added
            LABEL_ADDED=$(gh api "repos/$GH_REPO/issues/$PR_NUM/events" --jq "[.[] | select(.event == \"labeled\" and .label.name == \"$UNMET_LABEL\")] | last | .created_at")

            if [ -z "$LABEL_ADDED" ] || [ "$LABEL_ADDED" = "null" ]; then
              continue
            fi

            if [[ "$LABEL_ADDED" < "$CUTOFF_DATE" ]]; then
              # Skip draft PRs
              IS_DRAFT=$(gh pr view "$PR_NUM" --json isDraft --jq '.isDraft' 2>/dev/null || echo "false")
              if [ "$IS_DRAFT" = "true" ]; then
                continue
              fi

              # Re-check requirements before closing
              BODY_LENGTH=$(echo -n "$PRBODY" | wc -c | tr -d ' ')
              ISSUES_MET="false"

              if [ "$BODY_LENGTH" -ge "$MIN_LENGTH" ]; then
                CLOSING_ISSUES=$(gh pr view "$PR_NUM" --json closingIssuesReferences --jq '.closingIssuesReferences[].number' 2>/dev/null || echo "")
                REGEX_ISSUES=$(echo "$PRBODY" | grep -oE '#[0-9]+|issues/[0-9]+' | grep -oE '[0-9]+' || echo "")
                ISSUE_NUMBERS=$(echo -e "$CLOSING_ISSUES\n$REGEX_ISSUES" | sort -u | grep -v '^$' || true)

                for ISSUE_NUM in $ISSUE_NUMBERS; do
                  LABELS=$(gh issue view "$ISSUE_NUM" --json labels --jq '.labels[].name' 2>/dev/null || echo "")
                  if echo "$LABELS" | grep -qx "$HELP_WANTED_LABEL"; then
                    ISSUES_MET="true"
                    break
                  fi
                done
              fi

              if [ "$ISSUES_MET" = "true" ] && [ "$BODY_LENGTH" -ge "$MIN_LENGTH" ]; then
                # Requirements now met — remove label, restore triage
                gh pr edit "$PR_NUM" --remove-label "$UNMET_LABEL" --add-label "$TRIAGE_LABEL"
                gh pr comment "$PR_NUM" --body "Thank you for updating your pull request! It now meets the minimum requirements and has been queued for triage."
              else
                gh pr edit "$PR_NUM" --remove-label "$TRIAGE_LABEL" || true
                gh pr close "$PR_NUM"
              fi
            fi
          done
